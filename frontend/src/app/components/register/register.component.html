<div class="min-h-screen flex items-center justify-center p-6">
    <div class="glass-card w-full max-md p-8 animate-in fade-in slide-in-from-bottom duration-500">
        <div class="text-center mb-10">
            <h1
                class="text-4xl font-bold tracking-tight mb-2 bg-gradient-to-r from-blue-400 to-indigo-400 bg-clip-text text-transparent">
                Join Us
            </h1>
            <p class="text-slate-400">Start managing your team's tickets efficiently</p>
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-6">
            <div class="space-y-2">
                <label for="email" class="text-sm font-medium text-slate-300 ml-1">Email Address</label>
                <input id="email" type="email" formControlName="email" placeholder="name@company.com"
                    class="glass-input w-full"
                    [class.ring-red-500]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
                <p *ngIf="registerForm.get('email')?.errors?.['email'] && registerForm.get('email')?.touched"
                    class="text-xs text-red-400 mt-1 ml-1">
                    Please enter a valid email address
                </p>
                <p *ngIf="registerForm.get('email')?.errors?.['required'] && registerForm.get('email')?.touched"
                    class="text-xs text-red-400 mt-1 ml-1">
                    Email is required
                </p>
            </div>

            <div class="space-y-2">
                <label for="password" class="text-sm font-medium text-slate-300 ml-1">Password</label>
                <input id="password" type="password" formControlName="password" placeholder="••••••••"
                    class="glass-input w-full"
                    [class.ring-red-500]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
                <p *ngIf="registerForm.get('password')?.errors?.['required'] && registerForm.get('password')?.touched"
                    class="text-xs text-red-400 mt-1 ml-1">
                    Password is required
                </p>
                <p *ngIf="registerForm.get('password')?.errors?.['minlength'] && registerForm.get('password')?.touched"
                    class="text-xs text-red-400 mt-1 ml-1">
                    Password must be at least 6 characters long
                </p>
            </div>

            <div *ngIf="error"
                class="bg-red-500/10 border border-red-500/20 text-red-400 p-3 rounded-xl text-sm text-center">
                {{ error }}
            </div>

            <div *ngIf="success"
                class="bg-green-500/10 border border-green-500/20 text-green-400 p-3 rounded-xl text-sm text-center">
                {{ success }}
            </div>

            <button type="submit" [disabled]="registerForm.invalid || loading"
                class="btn-primary w-full disabled:opacity-50 disabled:cursor-not-allowed">
                <span *ngIf="!loading">Create Account</span>
                <span *ngIf="loading" class="flex items-center justify-center">
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg"
                        fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4">
                        </circle>
                        <path class="opacity-75" fill="currentColor"
                            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
                        </path>
                    </svg>
                    Registering...
                </span>
            </button>

            <div class="text-center mt-6">
                <p class="text-slate-400 text-sm">
                    Already have an account?
                    <a routerLink="/login" class="text-blue-400 hover:text-blue-300 font-medium transition-colors">Sign
                        in</a>
                </p>
            </div>
        </form>
    </div>
</div>
